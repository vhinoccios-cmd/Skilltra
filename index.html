
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1b3e;--bg2:#132148;--bg3:#1a2d5a;--card:#1e3364;--card2:#243b72;
  --accent:#4f8ef7;--accent2:#3a6fd8;--text:#e8edf8;--text2:#9aadcc;--text3:#6b82a8;
  --success:#2dd4a0;--warn:#f5a623;--danger:#f05c5c;--border:#2a3f6b;
  --radius:10px;--font:'Segoe UI',system-ui,sans-serif
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:600px;font-size:14px}
.app{display:flex;min-height:600px}
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--border);padding:16px 0;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:0 16px 20px;border-bottom:1px solid var(--border);margin-bottom:8px}
.sidebar-logo h2{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:1px}
.sidebar-logo p{font-size:10px;color:var(--text3);margin-top:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:var(--text2);font-size:13px;transition:.15s;border-left:3px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--accent);border-left-color:var(--accent)}
.nav-item i{font-size:16px;width:18px;text-align:center}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:15px;font-weight:600}
.topbar-user{display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
.page{padding:24px;flex:1;overflow-y:auto}
.hidden{display:none!important}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:600px;background:linear-gradient(135deg,#0a1628 0%,#0d1f45 100%)}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:360px}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-size:28px;font-weight:800;color:var(--accent);letter-spacing:2px}
.login-logo p{font-size:12px;color:var(--text3);margin-top:4px;font-style:italic}
.tab-row{display:flex;background:var(--bg);border-radius:8px;padding:3px;margin-bottom:24px}
.tab-btn{flex:1;padding:8px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;background:transparent;color:var(--text2);transition:.15s}
.tab-btn.active{background:var(--accent2);color:#fff}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px}
.form-group input{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;transition:.15s}
.form-group input:focus{border-color:var(--accent)}
.btn{width:100%;padding:11px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.error-msg{color:var(--danger);font-size:12px;margin-top:8px;padding:8px 12px;background:rgba(240,92,92,.1);border-radius:6px;border-left:3px solid var(--danger)}
.hint{text-align:center;font-size:11px;color:var(--text3);margin-top:12px}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card h3{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--text)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.stat-num{font-size:28px;font-weight:700;color:var(--accent)}
.stat-label{font-size:12px;color:var(--text3);margin-top:4px}

/* Cert items */
.cert-item{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.cert-icon{width:40px;height:40px;border-radius:8px;background:rgba(79,142,247,.15);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.cert-info{flex:1}
.cert-info h4{font-size:13px;font-weight:600}
.cert-info p{font-size:11px;color:var(--text3);margin-top:3px}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:rgba(45,212,160,.15);color:var(--success)}
.badge-blue{background:rgba(79,142,247,.15);color:var(--accent)}
.badge-warn{background:rgba(245,166,35,.15);color:var(--warn)}
.badge-gray{background:rgba(107,130,168,.15);color:var(--text3)}
.progress-bar{height:5px;background:var(--border);border-radius:3px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:var(--accent)}

/* Leaderboard */
.lb-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;margin-bottom:6px}
.lb-row:nth-child(1){background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2)}
.lb-row:nth-child(2){background:rgba(192,192,192,.08);border:1px solid rgba(192,192,192,.15)}
.lb-row:nth-child(3){background:rgba(205,127,50,.08);border:1px solid rgba(205,127,50,.15)}
.lb-row:not(:nth-child(-n+3)){background:var(--card2);border:1px solid var(--border)}
.lb-rank{font-size:16px;font-weight:700;width:28px;text-align:center}
.lb-name{flex:1;font-size:13px;font-weight:500}
.lb-pts{font-size:13px;font-weight:600;color:var(--accent)}

/* Test items */
.test-item{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:.15s}
.test-item:hover{border-color:var(--accent)}
.test-info{flex:1}
.test-info h4{font-size:13px;font-weight:600}
.test-info p{font-size:11px;color:var(--text3);margin-top:3px}
.btn-sm{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:var(--accent);color:#fff;transition:.15s}
.btn-sm:hover{background:var(--accent2)}
.btn-outline{background:transparent;border:1px solid var(--accent);color:var(--accent)}

/* Section header */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-hdr h2{font-size:16px;font-weight:600}

/* Track items */
.track-item{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px}
.track-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.track-header h4{font-size:13px;font-weight:600}

/* Admin forms */
.form-row{display:flex;gap:12px;margin-bottom:14px}
.form-row label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px}
.form-row input,.form-row select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 12px;font-size:13px;width:100%;outline:none}
.form-row .f{flex:1}

/* Notice */
.notice{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.notice-green{background:rgba(45,212,160,.1);border:1px solid rgba(45,212,160,.2);color:var(--success)}
.notice-blue{background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.2);color:var(--accent)}
</style>

<div id="root"></div>

<script>
const ADMIN_PASS = 'admin123';

const adminCerts = [
  {id:1, title:'Web Development Fundamentals', tracks:['HTML Basics','CSS Layouts','JavaScript Core'], tests:['HTML Quiz','CSS Test','JS Assessment'], assigned:true, badge:'Assigned'},
  {id:2, title:'Data Analytics Professional', tracks:['SQL Fundamentals','Python for Data','Visualization'], tests:['SQL Exam','Python Test'], assigned:true, badge:'Assigned'},
  {id:3, title:'Cloud Architecture Basics', tracks:['AWS Intro','Azure Fundamentals'], tests:['Cloud Quiz'], assigned:false, badge:'Unassigned'},
];

const leaderboardData = [
  {rank:1,name:'Maria Santos',pts:2840,badge:'🥇'},
  {rank:2,name:'John Cruz',pts:2610,badge:'🥈'},
  {rank:3,name:'Ana Reyes',pts:2390,badge:'🥉'},
  {rank:4,name:'Carlos Tan',pts:2100},
  {rank:5,name:'Lena Garcia',pts:1950},
  {rank:6,name:'You',pts:1720,isMe:true},
];

let state = {
  view: 'login',
  role: null,
  loginTab: 'member',
  loginError: '',
  memberPage: 'dashboard',
  adminPage: 'overview',
};

function render() {
  const root = document.getElementById('root');
  if (state.view === 'login') {
    root.innerHTML = renderLogin();
    bindLogin();
  } else if (state.role === 'member') {
    root.innerHTML = renderMemberApp();
    bindNav();
  } else if (state.role === 'admin') {
    root.innerHTML = renderAdminApp();
    bindNav();
  }
}

function renderLogin() {
  return `
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <h1>SKILLTRA</h1>
        <p>Learning Intelligence Platform</p>
      </div>
      <div class="tab-row">
        <button class="tab-btn ${state.loginTab==='member'?'active':''}" onclick="setTab('member')">Member Login</button>
        <button class="tab-btn ${state.loginTab==='admin'?'active':''}" onclick="setTab('admin')">Admin</button>
      </div>
      ${state.loginTab==='member'?`
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="emailInput" placeholder="member@email.com" value="member@skilltra.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="passInput" placeholder="••••••••" value="password"/>
        </div>
        <button class="btn btn-primary" onclick="loginMember()">Sign In</button>
      `:`
        <div class="form-group">
          <label>Admin Password</label>
          <input type="password" id="adminPassInput" placeholder="••••••••"/>
        </div>
        ${state.loginError?`<div class="error-msg">${state.loginError}</div>`:''}
        <button class="btn btn-primary" onclick="loginAdmin()">Sign In as Admin</button>
        <p class="hint">Default password: admin123</p>
      `}
    </div>
  </div>`;
}

function setTab(tab) { state.loginTab = tab; state.loginError = ''; render(); }

function loginMember() {
  state.view = 'app'; state.role = 'member'; state.memberPage = 'dashboard'; render();
}

function loginAdmin() {
  const val = document.getElementById('adminPassInput').value;
  if (val === ADMIN_PASS) {
    state.view = 'app'; state.role = 'admin'; state.adminPage = 'overview'; state.loginError = ''; render();
  } else {
    state.loginError = 'Incorrect password.'; render();
  }
}

function logout() { state.view='login'; state.role=null; state.loginError=''; render(); }

function setMemberPage(p) { state.memberPage=p; render(); }
function setAdminPage(p) { state.adminPage=p; render(); }

function renderMemberApp() {
  const pages = {
    dashboard: renderMemberDashboard,
    certifications: renderMemberCerts,
    leaderboard: renderMemberLeaderboard,
    profile: renderMemberProfile,
  };
  const pageFn = pages[state.memberPage] || renderMemberDashboard;
  return `
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-logo"><h2>SKILLTRA</h2><p>Learning Platform</p></div>
      ${navItem('ti-layout-dashboard','Dashboard','dashboard',state.memberPage,'setMemberPage')}
      ${navItem('ti-certificate','Certifications','certifications',state.memberPage,'setMemberPage')}
      ${navItem('ti-trophy','Leaderboard','leaderboard',state.memberPage,'setMemberPage')}
      ${navItem('ti-user','Profile','profile',state.memberPage,'setMemberPage')}
      <div style="margin-top:auto;padding:12px 16px;">
        <div class="nav-item" onclick="logout()" style="color:var(--danger)">
          <i class="ti ti-logout"></i> Sign out
        </div>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <span class="topbar-title">${pageTitles[state.memberPage]||'Dashboard'}</span>
        <div class="topbar-user">
          <span style="font-size:12px;color:var(--text2)">Maria Santos</span>
          <div class="avatar">MS</div>
        </div>
      </div>
      <div class="page">${pageFn()}</div>
    </div>
  </div>`;
}

const pageTitles = {
  dashboard:'My Dashboard',certifications:'Certifications & Tests',
  leaderboard:'Leaderboard',profile:'My Profile',
  overview:'Overview',members:'Members',certificates:'Certificates',settings:'Settings'
};

function navItem(icon, label, page, current, fn) {
  return `<div class="nav-item ${current===page?'active':''}" onclick="${fn}('${page}')">
    <i class="ti ${icon}"></i>${label}
  </div>`;
}

function renderMemberDashboard() {
  const assigned = adminCerts.filter(c=>c.assigned);
  const total = assigned.length;
  return `
  <div class="notice notice-blue"><i class="ti ti-info-circle"></i> ${total} certification(s) assigned by your admin. View them under <strong>Certifications</strong>.</div>
  <div class="grid-3" style="margin-bottom:20px">
    <div class="card"><div class="stat-num">${total}</div><div class="stat-label">Assigned Certs</div></div>
    <div class="card"><div class="stat-num">3</div><div class="stat-label">In Progress</div></div>
    <div class="card"><div class="stat-num">1,720</div><div class="stat-label">My Points</div></div>
  </div>
  <div class="card">
    <h3>Recent Activity</h3>
    ${assigned.map(c=>`
      <div class="cert-item">
        <div class="cert-icon"><i class="ti ti-certificate" style="color:var(--accent)"></i></div>
        <div class="cert-info">
          <h4>${c.title}</h4>
          <p>${c.tracks.length} learning tracks · ${c.tests.length} test(s)</p>
          <div class="progress-bar"><div class="progress-fill" style="width:${30+Math.random()*50|0}%"></div></div>
        </div>
        <span class="badge badge-blue">${c.badge}</span>
      </div>
    `).join('')}
  </div>`;
}

function renderMemberCerts() {
  const assigned = adminCerts.filter(c=>c.assigned);
  return `
  <div class="section-hdr"><h2>Assigned Certifications</h2></div>
  ${assigned.map(c=>`
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div>
          <h3 style="margin:0">${c.title}</h3>
          <p style="font-size:11px;color:var(--text3);margin-top:4px">Assigned by Admin</p>
        </div>
        <span class="badge badge-green">Active</span>
      </div>
      <div style="margin-bottom:12px">
        <p style="font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500">Learning Tracks</p>
        ${c.tracks.map(t=>`
          <div class="track-item">
            <div class="track-header">
              <h4>${t}</h4>
              <span class="badge badge-blue">In Progress</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:${20+Math.random()*70|0}%"></div></div>
          </div>
        `).join('')}
      </div>
      <div>
        <p style="font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500">Tests for this Certification</p>
        ${c.tests.map(t=>`
          <div class="test-item">
            <div class="cert-icon"><i class="ti ti-pencil" style="color:var(--warn)"></i></div>
            <div class="test-info">
              <h4>${t}</h4>
              <p>Tap to begin · 30 questions</p>
            </div>
            <button class="btn-sm">Take Test</button>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('')}`;
}

function renderMemberLeaderboard() {
  return `
  <div class="section-hdr"><h2>Top Members</h2></div>
  <div class="card">
    ${leaderboardData.map(r=>`
      <div class="lb-row" style="${r.isMe?'border-color:var(--accent)!important;background:rgba(79,142,247,.1)!important':''}">
        <span class="lb-rank">${r.badge||r.rank}</span>
        <span class="lb-name">${r.name}${r.isMe?' <span style="font-size:10px;color:var(--text3)">(You)</span>':''}</span>
        <span class="lb-pts">${r.pts.toLocaleString()} pts</span>
      </div>
    `).join('')}
  </div>`;
}

function renderMemberProfile() {
  return `
  <div class="card" style="max-width:460px">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
      <div class="avatar" style="width:56px;height:56px;font-size:18px">MS</div>
      <div>
        <h3 style="margin:0">Maria Santos</h3>
        <p style="font-size:12px;color:var(--text3);margin-top:3px">member@skilltra.com</p>
        <span class="badge badge-blue" style="margin-top:6px">Member</span>
      </div>
    </div>
    <div class="grid-2">
      <div><p style="font-size:11px;color:var(--text3)">Points</p><p style="font-weight:600;font-size:16px;margin-top:2px">1,720</p></div>
      <div><p style="font-size:11px;color:var(--text3)">Rank</p><p style="font-weight:600;font-size:16px;margin-top:2px">#6</p></div>
    </div>
  </div>`;
}

function renderAdminApp() {
  const pages = {
    overview: renderAdminOverview,
    members: renderAdminMembers,
    certificates: renderAdminCertificates,
    settings: renderAdminSettings,
  };
  const pageFn = pages[state.adminPage] || renderAdminOverview;
  return `
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-logo"><h2>SKILLTRA</h2><p>Admin Panel</p></div>
      ${navItem('ti-layout-dashboard','Overview','overview',state.adminPage,'setAdminPage')}
      ${navItem('ti-users','Members','members',state.adminPage,'setAdminPage')}
      ${navItem('ti-certificate','Certificates','certificates',state.adminPage,'setAdminPage')}
      ${navItem('ti-settings','Settings','settings',state.adminPage,'setAdminPage')}
      <div style="margin-top:auto;padding:12px 16px;">
        <div class="nav-item" onclick="logout()" style="color:var(--danger)">
          <i class="ti ti-logout"></i> Sign out
        </div>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <span class="topbar-title">${pageTitles[state.adminPage]||'Overview'}</span>
        <div class="topbar-user">
          <span style="font-size:12px;color:var(--text2)">Administrator</span>
          <div class="avatar" style="background:var(--warn);color:#1a1a1a">A</div>
        </div>
      </div>
      <div class="page">${pageFn()}</div>
    </div>
  </div>`;
}

function renderAdminOverview() {
  return `
  <div class="grid-3" style="margin-bottom:20px">
    <div class="card"><div class="stat-num">24</div><div class="stat-label">Total Members</div></div>
    <div class="card"><div class="stat-num">${adminCerts.filter(c=>c.assigned).length}</div><div class="stat-label">Active Certs</div></div>
    <div class="card"><div class="stat-num">91%</div><div class="stat-label">Completion Rate</div></div>
  </div>
  <div class="card">
    <h3>Assigned Certificates</h3>
    ${adminCerts.filter(c=>c.assigned).map(c=>`
      <div class="cert-item">
        <div class="cert-icon"><i class="ti ti-certificate" style="color:var(--success)"></i></div>
        <div class="cert-info">
          <h4>${c.title}</h4>
          <p>${c.tracks.length} tracks · ${c.tests.length} tests · Sent to all members</p>
        </div>
        <span class="badge badge-green">Assigned</span>
      </div>
    `).join('')}
  </div>`;
}

function renderAdminMembers() {
  const members = ['Maria Santos','John Cruz','Ana Reyes','Carlos Tan','Lena Garcia'];
  return `
  <div class="section-hdr"><h2>Members</h2><button class="btn-sm">+ Add Member</button></div>
  <div class="card">
    ${members.map((m,i)=>`
      <div class="cert-item">
        <div class="avatar">${m.split(' ').map(w=>w[0]).join('')}</div>
        <div class="cert-info">
          <h4>${m}</h4>
          <p>${adminCerts.filter(c=>c.assigned).length} certs assigned · Active</p>
        </div>
        <button class="btn-sm btn-outline">Manage</button>
      </div>
    `).join('')}
  </div>`;
}

function renderAdminCertificates() {
  return `
  <div class="section-hdr"><h2>Certificates</h2><button class="btn-sm">+ Create New</button></div>
  ${adminCerts.map(c=>`
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <h3 style="margin:0">${c.title}</h3>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge ${c.assigned?'badge-green':'badge-gray'}">${c.badge}</span>
          <button class="btn-sm ${c.assigned?'btn-outline':''}" onclick="toggleAssign(${c.id})">
            ${c.assigned?'Unassign':'Assign to Members'}
          </button>
        </div>
      </div>
      <p style="font-size:12px;color:var(--text3)">Tracks: ${c.tracks.join(' · ')}</p>
      <p style="font-size:12px;color:var(--text3);margin-top:4px">Tests: ${c.tests.join(' · ')}</p>
    </div>
  `).join('')}`;
}

function renderAdminSettings() {
  return `
  <div class="card" style="max-width:440px">
    <h3 style="margin-bottom:16px">Admin Settings</h3>
    <div class="form-row"><div class="f"><label>Platform Name</label><input value="Skilltra"/></div></div>
    <div class="form-row"><div class="f"><label>Admin Email</label><input value="admin@skilltra.com"/></div></div>
    <div class="form-row"><div class="f"><label>New Admin Password</label><input type="password" placeholder="Leave blank to keep current"/></div></div>
    <button class="btn-sm" style="margin-top:4px">Save Changes</button>
  </div>`;
}

function toggleAssign(id) {
  const c = adminCerts.find(x=>x.id===id);
  if(c){ c.assigned=!c.assigned; c.badge=c.assigned?'Assigned':'Unassigned'; render(); }
}

function bindLogin() {}
